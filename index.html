<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tenki Japan Sales Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Tenki Japan</p>
      <h1>Sales Search</h1>
    </div>
    <div class="status" id="loadStatus">Loading sales data...</div>
  </header>

  <main>
    <section class="filters" aria-label="Sales filters">
      <label>
        Product genre
        <select id="genreSelect" disabled>
          <option value="all">All product genres</option>
        </select>
      </label>
      <label>
        Shop
        <select id="shopSelect" disabled>
          <option value="all">All shops</option>
        </select>
      </label>
      <label>
        Year
        <select id="yearSelect" disabled>
          <option value="">Year</option>
        </select>
      </label>
      <label>
        Month
        <select id="monthSelect" disabled>
          <option value="">Month</option>
        </select>
      </label>
      <label>
        Day
        <select id="daySelect" disabled>
          <option value="">Day</option>
        </select>
      </label>
      <label>
        Minimum sales
        <input id="minSalesInput" type="number" min="0" step="1000" placeholder="0" disabled>
      </label>
      <button id="resetButton" type="button" disabled>Reset</button>
    </section>

    <section class="metrics" aria-label="Search result totals">
      <article>
        <span>Total sales</span>
        <strong id="salesMetric">-</strong>
      </article>
      <article>
        <span>Units sold</span>
        <strong id="unitsMetric">-</strong>
      </article>
    </section>

    <section class="workspace">
      <div class="panel chart-panel">
        <div class="panel-heading">
          <h2>Sales by Day</h2>
          <span id="resultCount">0 rows</span>
        </div>
        <div class="chart" id="chart"></div>
      </div>

      <div class="panel">
        <div class="panel-heading">
          <h2>Matching Results</h2>
          <button id="exportButton" type="button" disabled>Download CSV</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Shop</th>
                <th>Genre</th>
                <th>Sales</th>
                <th>Units</th>
                <th>PV</th>
                <th>UV</th>
                <th>Rating</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr><td colspan="8">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel event-panel">
      <div class="panel-heading">
        <h2>Events On Selected Day</h2>
        <span id="eventCount">0 events</span>
      </div>
      <div id="eventList" class="event-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
